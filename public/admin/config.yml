backend:
  name: github
  repo: Biriris/seenpleen-site
  branch: main
  base_url: https://sveltia-cms-auth.kostantinoskostaras.workers.dev

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site_data"
    label: "Site Data"
    files:
      - name: "projects"
        label: "Projects"
        file: "src/data/projects.json"
        format: "json"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            root: true
            summary: "{{fields.title}}"
            collapsed: true
            fields:
              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Slug"
                name: "slug"
                widget: "string"
                hint: "Lowercase English words with hyphens, e.g. the-matchbox-house."

              - label: "Order"
                name: "order"
                widget: "number"
                required: false
                value_type: "int"
                hint: "Lower numbers appear first."

              - label: "Hide Project"
                name: "hidden"
                widget: "boolean"
                required: false
                default: false

              - label: "SEO Title"
                name: "seo_title"
                widget: "string"
                required: false
                hint: "Optional. If empty, the project title will be used."

              - label: "SEO Description"
                name: "seo_description"
                widget: "text"
                required: false
                hint: "Optional short description for search previews. Keep it around 140–160 characters."

              - label: "Subtitle / Legacy Project Info"
                name: "project_id"
                widget: "string"
                required: false

              - label: "Category"
                name: "category"
                widget: "select"
                required: false
                options:
                  - Residential
                  - Commercial
                  - Hospitality
                  - Interior Design
                  - Renovation
                  - Mixed Use
                  - Concept

              - label: "Subcategory"
                name: "subcategory"
                widget: "select"
                required: false
                options:
                  - House
                  - Apartment
                  - Villa
                  - Cafe
                  - Restaurant
                  - Bar
                  - Hotel
                  - Office
                  - Retail
                  - Workspace
                  - Vacation House

              - label: "Client"
                name: "client"
                widget: "string"
                required: false

              - label: "Location"
                name: "location"
                widget: "string"
                required: false

              - label: "Year"
                name: "year"
                widget: "string"
                required: false

              - label: "Area"
                name: "area"
                widget: "string"
                required: false
                hint: "Example: 165 m²"

              - label: "Status"
                name: "status"
                widget: "select"
                required: false
                options:
                  - Completed
                  - Under Construction
                  - In Progress
                  - Concept
                  - Proposal

              - label: "Featured Project"
                name: "featured"
                widget: "boolean"
                required: false
                default: false

              - label: "Description"
                name: "details"
                widget: "text"
                required: false

              - label: "Cover Image"
                name: "cover"
                widget: "image"
                required: false
                hint: "Used in the homepage project grid."

              - label: "Cover Alt Text"
                name: "cover_alt"
                widget: "string"
                required: false
                hint: "Describe the image briefly. If empty, the project title will be used."

              - label: "Hero Image"
                name: "hero"
                widget: "image"
                required: false
                hint: "Used at the top of the project page. If empty, the cover image will be used."

              - label: "Hero Alt Text"
                name: "hero_alt"
                widget: "string"
                required: false
                hint: "Describe the hero image briefly. If empty, cover alt or project title will be used."

              - label: "Gallery"
                name: "gallery"
                widget: "list"
                required: false
                collapsed: true
                summary: "{{fields.title}}"
                fields:
                  - label: "Image"
                    name: "url"
                    widget: "image"

                  - label: "Title"
                    name: "title"
                    widget: "string"
                    required: false

                  - label: "Alt Text"
                    name: "alt"
                    widget: "string"
                    required: false
                    hint: "Optional, but useful for accessibility and SEO."