backend:
  name: github
  repo: Biriris/seenpleen-site
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site_data"
    label: "Site Data"
    files:
      - name: "projects"
        label: "Projects"
        file: "src/data/projects.json"
        format: "json"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            root: true
            summary: "{{fields.title}}"
            collapsed: true
            fields:
              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Slug"
                name: "slug"
                widget: "string"
                hint: "Lowercase English words with hyphens, e.g. the-matchbox-house."

              - label: "Subtitle / Legacy Project Info"
                name: "project_id"
                widget: "string"
                required: false

              - label: "Category"
                name: "category"
                widget: "string"
                required: false

              - label: "Client"
                name: "client"
                widget: "string"
                required: false

              - label: "Location"
                name: "location"
                widget: "string"
                required: false

              - label: "Year"
                name: "year"
                widget: "string"
                required: false

              - label: "Area"
                name: "area"
                widget: "string"
                required: false
                hint: "Example: 165 m²"

              - label: "Status"
                name: "status"
                widget: "string"
                required: false
                hint: "Example: Completed, Under Construction, Concept"

              - label: "Featured Project"
                name: "featured"
                widget: "boolean"
                required: false
                default: false

              - label: "Description"
                name: "details"
                widget: "text"
                required: false

              - label: "Cover Image"
                name: "cover"
                widget: "image"
                required: false

              - label: "Hero Image"
                name: "hero"
                widget: "image"
                required: false
                hint: "Optional. If empty, the cover image will be used."

              - label: "Gallery"
                name: "gallery"
                widget: "list"
                required: false
                collapsed: true
                summary: "{{fields.title}}"
                fields:
                  - label: "Image"
                    name: "url"
                    widget: "image"

                  - label: "Title"
                    name: "title"
                    widget: "string"
                    required: false

                  - label: "Alt Text"
                    name: "alt"
                    widget: "string"
                    required: false