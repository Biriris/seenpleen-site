backend:
  name: test-repo
  repo: Biriris/seenpleen-site
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: projects
    label: Projects
    files:
      - name: projects
        label: Projects
        file: src/data/projects.json
        fields:
          - label: Projects
            name: body
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Slug, name: slug, widget: string }
              - { label: Project Info, name: project_id, widget: string, required: false }
              - { label: Description, name: details, widget: text, required: false }
              - { label: Cover Image, name: cover, widget: image, required: false }
              - label: Gallery
                name: gallery
                widget: list
                required: false
                fields:
                  - { label: Image, name: url, widget: image }
                  - { label: Title, name: title, widget: string, required: false }
                  - { label: Alt Text, name: alt, widget: string, required: false }